apiVersion: v1
kind: Secret
metadata:
  name: ms-usuarios-keys
  namespace: plataforma-incendios
type: Opaque
data:
  # Base64-encoded contents of private_key.pem and public_key.pem
  # Example (local):
  # kubectl create secret generic ms-usuarios-keys --from-file=private_key.pem=./private_key.pem --from-file=public_key.pem=./public_key.pem
  private_key.pem: PLACEHOLDER_BASE64_PRIVATE
  public_key.pem: PLACEHOLDER_BASE64_PUBLIC
