apiVersion: batch/v1
kind: Job
metadata:
  name: minio-setup
  namespace: plataforma-incendios
spec:
  template:
    metadata:
      labels:
        app: minio-setup
    spec:
      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              until (/usr/bin/mc alias set mials http://minio-storage:9000 minio_userlog minio_passlog); do
                echo 'Waiting for MinIO storage API...'
                sleep 2
              done
              /usr/bin/mc mb --ignore-existing mials/multimedia-reportes
              /usr/bin/mc anonymous set download mials/multimedia-reportes
              echo 'MinIO configuration completed successfully!'
      restartPolicy: OnFailure
  backoffLimit: 5
