apiVersion: batch/v1
kind: Job
metadata:
  name: minio-setup
  namespace: plataforma-incendios
  labels:
    app: minio-setup
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 10
  template:
    metadata:
      labels:
        app: minio-setup
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-minio
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z minio-storage 9000; do
                echo "Waiting for MinIO..."
                sleep 2
              done
      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              mc alias set local http://minio-storage:9000 minio_userlog minio_passlog
              mc mb --ignore-existing local/multimedia-reportes
              mc anonymous set download local/multimedia-reportes
              echo "MinIO bucket multimedia-reportes ready"
