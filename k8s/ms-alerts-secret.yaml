apiVersion: v1
kind: Secret
metadata:
  name: ms-alerts-keys
  namespace: plataforma-incendios
type: Opaque
stringData:
  VAPID_PUBLIC_KEY: "<reemplaza con VAPID_PUBLIC_KEY de .env>"
  VAPID_PRIVATE_KEY: "<reemplaza con VAPID_PRIVATE_KEY de .env>"
  VAPID_SUBJECT: "<reemplaza con VAPID_SUBJECT de .env>"

# Si prefiere no usar este manifest, el script scripts/deploy-k8s.sh
# o scripts/deploy-k8s.ps1 crea el secreto automáticamente usando .env.
