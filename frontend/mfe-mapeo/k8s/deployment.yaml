apiVersion: apps/v1
kind: Deployment
metadata:
  name: mfe-mapeo
  namespace: plataforma-incendios
  labels:
    app: mfe-mapeo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mfe-mapeo
  template:
    metadata:
      labels:
        app: mfe-mapeo
    spec:
      containers:
        - name: mfe-mapeo
          image: plataforma/mfe-mapeo:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 300m
