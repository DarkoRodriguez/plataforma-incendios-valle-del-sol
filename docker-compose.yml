  # ============================================
  # Frontend (Micro-Frontend Mapeo)
  # ============================================
  mfe-mapeo:
    build:
      context: ./frontend/mfe-mapeo
      dockerfile: Dockerfile
    container_name: mfe-mapeo
    ports:
      - "3000:80"
    depends_on:
      - ms-bff
    networks:
      - plataforma-network
    restart: unless-stopped

  # ============================================
  # Object Storage (MinIO)
  # ============================================
  minio-storage:
    image: minio/minio
    container_name: minio_local
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio_userlog
      MINIO_ROOT_PASSWORD: minio_passlog
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - plataforma-network

  # ============================================
  # MinIO Init (Auto-create bucket)
  # ============================================
  minio-init:
    image: minio/mc:latest
    container_name: minio_configurador
    depends_on:
      - minio-storage
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set mials http://minio-storage:9000 minio_userlog minio_passlog); do echo 'Waiting for MinIO...'; sleep 1; done;
      /usr/bin/mc mb --ignore-existing mials/multimedia-reportes;
      /usr/bin/mc anonymous set download mials/multimedia-reportes;
      exit 0;
      "
    networks:
      - plataforma-network

  # ============================================
  # Optional: pgAdmin
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - plataforma-network
    restart: unless-stopped

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
  minio_data:

# ============================================
# Networks
# ============================================
networks:
  plataforma-network:
    driver: bridge
