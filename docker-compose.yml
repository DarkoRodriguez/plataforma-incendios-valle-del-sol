
services:
  # ============================================
  # Shared Database (PostGIS)
  # ============================================
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: plataforma-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - plataforma-network

  # ============================================
  # Backend For Frontend (BFF / API Gateway)
  # ============================================
  ms-bff:
    build:
      context: ./backend/bff
      dockerfile: Dockerfile
    container_name: ms-bff
    environment:
      SPRING_APPLICATION_NAME: ms-bff
      SERVER_PORT: 8080
      JWT_ISSUER: http://ms-users:8081
      JWK_SET_URI: http://ms-users:8081/.well-known/jwks.json
    ports:
      - "8090:8080"
    depends_on:
      - ms-users
      - ms-reports
      - ms-alerts
    networks:
      - plataforma-network
    restart: unless-stopped

  # ============================================
  # Microservice: MS-USUARIOS (Authentication)
  # ============================================
  ms-users:
    build:
      context: ./backend/ms-users
      dockerfile: Dockerfile
    container_name: ms-users
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ms_usuarios
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_APPLICATION_NAME: ms-users
      SERVER_PORT: 8081
      JWT_ISSUER: http://ms-users:8081
      JWT_PRIVATE_KEY_PATH: /run/keys/private_key.pem
      JWT_PUBLIC_KEY_PATH: /run/keys/public_key.pem
    volumes:
      - ./private_key.pem:/run/keys/private_key.pem:ro
      - ./public_key.pem:/run/keys/public_key.pem:ro
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - plataforma-network
    restart: unless-stopped

  # ============================================
  # Microservice: MS-MAPEO (Fire Reports & GIS)
  # ============================================
  ms-reports:
    build:
      context: ./backend/ms-reports
      dockerfile: Dockerfile
    container_name: ms-reports
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ms_mapeo
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_APPLICATION_NAME: ms-reports
      SERVER_PORT: 8082
      JWK_SET_URI: http://ms-users:8081/.well-known/jwks.json
      MINIO_ENDPOINT: http://minio-storage:9000
      MINIO_EXTERNAL_URL: http://localhost:9000
      MINIO_ACCESS_KEY: minio_userlog
      MINIO_SECRET_KEY: minio_passlog
      MINIO_BUCKET: multimedia-reportes
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      minio-storage:
        condition: service_started
    networks:
      - plataforma-network
    restart: unless-stopped

  # ============================================
  # Microservice: MS-ALERTS (Community Alerts)
  # ============================================
  ms-alerts:
    build:
      context: ./backend/ms-alerts
      dockerfile: Dockerfile
    container_name: ms-alerts
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ms_alerts
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_APPLICATION_NAME: ms-alerts
      SERVER_PORT: 8083
      JWK_SET_URI: http://ms-users:8081/.well-known/jwks.json
      VAPID_PUBLIC_KEY: "${VAPID_PUBLIC_KEY}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY}"
      VAPID_SUBJECT: "${VAPID_SUBJECT:-mailto:admin@example.com}"
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - plataforma-network
    restart: unless-stopped

  # ============================================
  # Frontend (Micro-Frontend Mapeo)
  # ============================================
  mfe-mapeo:
    build:
      context: ./frontend/mfe-mapeo
      dockerfile: Dockerfile
      args:
        VITE_VAPID_PUBLIC_KEY: "${VITE_VAPID_PUBLIC_KEY}"
        VITE_API_BASE: /api
    container_name: mfe-mapeo
    ports:
      - "3000:80"
    depends_on:
      - ms-bff
    networks:
      - plataforma-network
    restart: unless-stopped

  # ============================================
  # Object Storage (MinIO)
  # ============================================
  minio-storage:
    image: minio/minio
    container_name: minio_local
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio_userlog
      MINIO_ROOT_PASSWORD: minio_passlog
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - plataforma-network

  # ============================================
  # MinIO Init (Auto-create bucket)
  # ============================================
  minio-init:
    image: minio/mc:latest
    container_name: minio_configurador
    depends_on:
      - minio-storage
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set mials http://minio-storage:9000 minio_userlog minio_passlog); do echo 'Waiting for MinIO...'; sleep 1; done;
      /usr/bin/mc mb --ignore-existing mials/multimedia-reportes;
      /usr/bin/mc anonymous set download mials/multimedia-reportes;
      exit 0;
      "
    networks:
      - plataforma-network

  # ============================================
  # Optional: pgAdmin
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - plataforma-network
    restart: unless-stopped

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
  minio_data:

# ============================================
# Networks
# ============================================
networks:
  plataforma-network:
    driver: bridge
