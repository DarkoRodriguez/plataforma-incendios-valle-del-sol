version: '3.8'

services:
  # ============================================
  # Base de Datos Compartida
  # ============================================
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: plataforma-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - plataforma-network

  # ============================================
  # Backend For Frontend (BFF)
  # ============================================
  ms-bff:
    build:
      context: ./backend/ms-bff
      dockerfile: Dockerfile
    container_name: ms-bff
    environment:
      SPRING_APPLICATION_NAME: ms-bff
      SERVER_PORT: 8080
    ports:
      - "8090:8080"
    depends_on:
      - ms-usuarios
      - ms-mapeo
    networks:
      - plataforma-network
    restart: unless-stopped


  # ============================================
  # Microservicio: MS-USUARIOS
  # ============================================
  ms-usuarios:
    build:
      context: ./backend/ms-usuarios
      dockerfile: Dockerfile
    container_name: ms-usuarios
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ms_usuarios
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_APPLICATION_NAME: ms-usuarios
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - plataforma-network
    restart: unless-stopped

  # ============================================
  # Microservicio: MS-MAPEO
  # ============================================
  ms-mapeo:
    build:
      context: ./backend/ms-mapeo
      dockerfile: Dockerfile
    container_name: ms-mapeo
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ms_mapeo
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_APPLICATION_NAME: ms-mapeo
      SERVER_PORT: 8082
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - plataforma-network
    restart: unless-stopped

  # ============================================
  # Servicio Demo (Opcional)
  # ============================================
  demo:
    build:
      context: ./backend/demo
      dockerfile: Dockerfile
    container_name: demo-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/demo_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_APPLICATION_NAME: demo
      SERVER_PORT: 8083
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - plataforma-network
    restart: unless-stopped

  # ============================================
  # Frontend (Micro-Frontend Mapeo)
  # ============================================
  mfe-mapeo:
    build:
      context: ./frontend/mfe-mapeo
      dockerfile: Dockerfile
    container_name: mfe-mapeo
    ports:
      - "3000:80"
    networks:
      - plataforma-network
    restart: unless-stopped
  # ============================================
  # Bucket Imagenes (MiniIO)
  # ============================================
  minio-storage:
    image: minio/minio
    container_name: minio_local
    ports:
      - "9000:9000"       # Puerto para la API (Tu código se conecta aquí)
      - "9001:9001"       # Puerto para la consola web (Tú entras aquí)
    environment:
      MINIO_ROOT_USER: minio_userlog
      MINIO_ROOT_PASSWORD: minio_passlog
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

    
  #===========================================================
  #===== Crear el bucket de manera automática al iniciar =====
  #===========================================================
  minio-init:
    image: minio/mc:latest
    container_name: minio_configurador
    depends_on:
      - minio-storage
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set mials http://minio-storage:9000 minio_userlog minio_passlog); do echo 'Esperando a MinIO...'; sleep 1; done;
      /usr/bin/mc mb --ignore-existing mials/multimedia-reportes;
      /usr/bin/mc anonymous set download mials/multimedia-reportes;
      exit 0;
      "
  # ============================================
  # API Gateway (KrakenD)
  # ============================================
  krakend:
    image: devopsfaith/krakend:latest
    container_name: krakend
    volumes:
      - ./krakend:/etc/krakend
    ports:
      - "8080:8080"
    depends_on:
      - ms-bff
    networks:
      - plataforma-network
    restart: unless-stopped


  # ============================================
  # Herramientas Opcionales
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - plataforma-network
    restart: unless-stopped

# ============================================
# Volúmenes
# ============================================
volumes:
  postgres_data:
  minio_data:

# ============================================
# Redes
# ============================================
networks:
  plataforma-network:
    driver: bridge
