server:
  port: 8080

spring:
  application:
    name: ms-bff
  cloud:
    gateway:
      mvc:
        routes:
          - id: ms-users
            uri: http://ms-users:8081
            predicates:
              - Path=/api/users/**
            filters:
              - name: CircuitBreaker
                args:
                  name: msUsers
                  fallbackUri: forward:/api/fallback
          - id: ms-reports
            uri: http://ms-reports:8082
            predicates:
              - Path=/api/reports/**
            filters:
              - name: CircuitBreaker
                args:
                  name: msReports
                  fallbackUri: forward:/api/fallback
          - id: ms-alerts
            uri: http://ms-alerts:8083
            predicates:
              - Path=/api/alerts/**
            filters:
              - name: CircuitBreaker
                args:
                  name: msAlerts
                  fallbackUri: forward:/api/fallback
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER:http://localhost:8081}
          jwk-set-uri: ${JWK_SET_URI:http://localhost:8081/.well-known/jwks.json}

# Resilience4j
resilience4j.circuitbreaker:
  instances:
    msUsers:
      registerHealthIndicator: true
      slidingWindowSize: 10
      permittedNumberOfCallsInHalfOpenState: 3
      slidingWindowType: COUNT_BASED
      minimumNumberOfCalls: 5
      waitDurationInOpenState: 50s
      failureRateThreshold: 50
      eventConsumerBufferSize: 10
    msReports:
      registerHealthIndicator: true
      slidingWindowSize: 10
      permittedNumberOfCallsInHalfOpenState: 3
      slidingWindowType: COUNT_BASED
      minimumNumberOfCalls: 5
      waitDurationInOpenState: 50s
      failureRateThreshold: 50
      eventConsumerBufferSize: 10
    msAlerts:
      registerHealthIndicator: true
      slidingWindowSize: 10
      permittedNumberOfCallsInHalfOpenState: 3
      slidingWindowType: COUNT_BASED
      minimumNumberOfCalls: 5
      waitDurationInOpenState: 50s
      failureRateThreshold: 50
      eventConsumerBufferSize: 10

management:
  health:
    circuitbreakers:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
    urls:
      - name: BFF Gateway
        url: /v3/api-docs
      - name: ms-users
        url: /api/users/v3/api-docs
      - name: ms-reports
        url: /api/reports/v3/api-docs
      - name: ms-alerts
        url: /api/alerts/v3/api-docs
