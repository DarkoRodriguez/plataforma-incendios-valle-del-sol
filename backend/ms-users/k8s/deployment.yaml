apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-users
  namespace: plataforma-incendios
  labels:
    app: ms-users
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-users
  template:
    metadata:
      labels:
        app: ms-users
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Waiting for postgres..."
                sleep 2
              done
      containers:
        - name: ms-users
          image: plataforma/ms-users:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/ms_usuarios
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              value: postgres
            - name: SERVER_PORT
              value: "8081"
            - name: JWT_ISSUER
              value: http://ms-users:8081
            - name: JWK_SET_URI
              value: http://ms-users:8081/.well-known/jwks.json
            - name: JWT_PRIVATE_KEY_PATH
              value: /run/keys/private_key.pem
            - name: JWT_PUBLIC_KEY_PATH
              value: /run/keys/public_key.pem
          volumeMounts:
            - name: jwt-keys
              mountPath: /run/keys
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: jwt-keys
          secret:
            secretName: ms-usuarios-keys
            items:
              - key: private_key.pem
                path: private_key.pem
              - key: public_key.pem
                path: public_key.pem
