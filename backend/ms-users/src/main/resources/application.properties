spring.application.name=ms-usuarios

# PostgreSQL database configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/ms_usuarios
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driverClassName=org.postgresql.Driver

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=false
spring.flyway.validate-on-migrate=true

# JPA / Hibernate - validate ensures schema matches migrations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Server port
server.port=8081

# Springdoc OpenAPI path configuration
springdoc.api-docs.path=/api/users/v3/api-docs

# JWT Security Config
security.jwt.issuer=${JWT_ISSUER:http://localhost:8081}
security.jwt.access-token-minutes=${JWT_ACCESS_TOKEN_MINUTES:60}
security.jwt.private-key-path=${JWT_PRIVATE_KEY_PATH:../private_key.pem}
security.jwt.public-key-path=${JWT_PUBLIC_KEY_PATH:../public_key.pem}
security.jwt.jwks-url=${JWK_SET_URI:http://localhost:8081/.well-known/jwks.json}
