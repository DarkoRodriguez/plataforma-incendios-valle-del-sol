version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ms-usuarios-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ms_usuarios
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ms-usuarios-network

  ms-usuarios:
    build: .
    container_name: ms-usuarios-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ms_usuarios
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ms-usuarios-network

volumes:
  postgres_data:

networks:
  ms-usuarios-network:
    driver: bridge
