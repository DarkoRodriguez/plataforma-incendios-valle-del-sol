apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-reports
  namespace: plataforma-incendios
  labels:
    app: ms-reports
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-reports
  template:
    metadata:
      labels:
        app: ms-reports
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Waiting for postgres..."
                sleep 2
              done
        - name: wait-for-minio
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z minio-storage 9000; do
                echo "Waiting for minio..."
                sleep 2
              done
      containers:
        - name: ms-reports
          image: plataforma/ms-reports:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
              name: http
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/ms_mapeo
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              value: postgres
            - name: SERVER_PORT
              value: "8082"
            - name: JWK_SET_URI
              value: http://ms-users:8081/.well-known/jwks.json
            - name: MINIO_ENDPOINT
              value: http://minio-storage:9000
            - name: MINIO_EXTERNAL_URL
              value: http://localhost:30090
            - name: MINIO_ACCESS_KEY
              value: minio_userlog
            - name: MINIO_SECRET_KEY
              value: minio_passlog
            - name: MINIO_BUCKET
              value: multimedia-reportes
          readinessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
