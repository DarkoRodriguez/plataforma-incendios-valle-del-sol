apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-alerts
  namespace: plataforma-incendios
  labels:
    app: ms-alerts
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-alerts
  template:
    metadata:
      labels:
        app: ms-alerts
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Waiting for postgres..."
                sleep 2
              done
      containers:
        - name: ms-alerts
          image: plataforma/ms-alerts:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
              name: http
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/ms_alerts
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              value: postgres
            - name: SERVER_PORT
              value: "8083"
            - name: JWK_SET_URI
              value: http://ms-users:8081/.well-known/jwks.json
          envFrom:
            - secretRef:
                name: ms-alerts-keys
          readinessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
